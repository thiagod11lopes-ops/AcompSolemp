name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
          VITE_DATA_SOURCE: ${{ secrets.VITE_DATA_SOURCE }}
          VITE_GESTOR_GOOGLE_EMAIL: ${{ secrets.VITE_GESTOR_GOOGLE_EMAIL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APP_STATE_DOC: ${{ secrets.VITE_FIREBASE_APP_STATE_DOC }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_1.outputs.page_url || steps.deployment_retry_2.outputs.page_url || steps.deployment_retry_3.outputs.page_url }}
    steps:
      - name: Wait for Pages to settle
        run: sleep 30

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy retry 1
        id: deployment_retry_1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        run: sleep 60

      - name: Deploy retry 2
        id: deployment_retry_2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        run: sleep 90

      - name: Deploy retry 3
        id: deployment_retry_3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Verify deployment succeeded
        if: always()
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ]; then exit 0; fi
          if [ "${{ steps.deployment_retry_1.outcome }}" = "success" ]; then exit 0; fi
          if [ "${{ steps.deployment_retry_2.outcome }}" = "success" ]; then exit 0; fi
          if [ "${{ steps.deployment_retry_3.outcome }}" = "success" ]; then exit 0; fi
          echo "GitHub Pages deployment failed after 4 attempts."
          exit 1
